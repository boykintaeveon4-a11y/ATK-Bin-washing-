<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.T.K FreshBin</title>

<style>
html { scroll-behavior: smooth; }
body { margin:0; font-family:'Segoe UI', Arial; background:#000; color:#fff; overflow-x:hidden; }

/* NAVBAR */
nav { position:sticky; top:0; background:rgba(0,0,0,0.8); padding:15px; text-align:center; z-index:1000; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }

/* HEADER */
header { text-align:center; padding:60px 20px; }
h1 { font-size:50px; color:#fff; letter-spacing:3px; }
.subtitle { color:#aaa; font-size:22px; }

/* CARDS */
.container { display:flex; justify-content:center; gap:25px; flex-wrap:wrap; padding:20px; }
.card { background:#111; padding:30px; border-radius:25px; width:280px; text-align:center; transition:0.4s; box-shadow:0 0 25px rgba(255,255,255,0.2);}
.card:hover { transform:translateY(-12px) scale(1.08); box-shadow:0 0 35px #fff,0 0 50px #aaa; }
.price { color:#fff; font-size:30px; }

/* BUTTONS */
button { padding:15px 25px; border:none; border-radius:15px; color:white; font-weight:bold; cursor:pointer; transition:0.4s; font-size:16px; background:#333; }
button:hover { transform:scale(1.08); box-shadow:0 0 15px #fff; }

/* GALLERY */
.gallery { display:flex; gap:15px; overflow-x:auto; padding:20px; }
.gallery img { width:240px; border-radius:15px; transition:0.4s; }
.gallery img:hover { transform:scale(1.12); }

/* SECTION TITLES */
.section-title { text-align:center; margin-top:50px; font-size:28px; color:#fff; }

/* CHECKOUT FORM */
#checkout { display:none; text-align:center; padding:50px; border-top:2px solid #fff; }
#checkout form { display:flex; flex-direction:column; align-items:center; max-width:300px; margin:auto; }
input, select { padding:14px; margin:10px; border-radius:12px; border:none; width:100%; background:#222; color:#fff; }

/* FOOTER */
footer { text-align:center; padding:25px; opacity:0.7; font-size:14px; }

/* CONFIRMATION POPUP */
#confirmation {
    display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
    background:#111; border:2px solid #fff; padding:40px; border-radius:20px;
    box-shadow:0 0 25px #fff,0 0 40px #aaa; text-align:center; z-index:99999;
}
#confirmation h2 { color:#fff; margin-bottom:20px; }
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#gallery">Photos</a>
    <a href="#checkout">Book</a>
</nav>

<!-- HEADER -->
<header>
    <h1>A.T.K FreshBin</h1>
    <p class="subtitle">Trash Bin Cleaning & Lawn Care</p>
</header>

<!-- SERVICES -->
<h2 id="services" class="section-title">Our Services</h2>
<div class="container">
<div class="card">
    <h2>1 Bin Cleaning</h2>
    <p class="price">$30</p>
    <button onclick="showForm('1 Bin - $30')">Book & Pay</button>
</div>
<div class="card">
    <h2>🔥 2 Bin Deal</h2>
    <p class="price">$50</p>
    <button onclick="showForm('2 Bins - $50')">Book & Pay</button>
</div>
<div class="card">
    <h2>Grass Cutting</h2>
    <p class="price">$25</p>
    <button onclick="showForm('Grass Cutting - $25')">Book & Pay</button>
</div>
</div>

<!-- GALLERY -->
<h2 id="gallery" class="section-title">Before / After</h2>
<div class="gallery">
    <img src="images/before1.jpg" alt="Before">
    <img src="images/after1.jpg" alt="After">
    <img src="images/lawn1.jpg" alt="Lawn Before">
    <img src="images/lawn2.jpg" alt="Lawn After">
</div>

<!-- MAP -->
<h2 class="section-title">Service Area</h2>
<div style="text-align:center;">
<iframe width="90%" height="260" style="border:0;border-radius:12px;" 
src="https://maps.google.com/maps?q=Tulsa,Oklahoma&z=11&output=embed"></iframe>
</div>

<!-- CHECKOUT -->
<div id="checkout">
    <h2>Book & Pay</h2>
    <p id="serviceChosen"></p>
    <form id="bookingForm" action="https://formspree.io/f/xeeprrlv" method="POST" target="_blank">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="address" placeholder="Address" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="email" name="email" placeholder="Email" required>
        <label style="color:#ccc; margin-top:10px;">Select Date</label>
        <input type="date" name="date" required>
        <label style="color:#ccc;">Select Time</label>
        <input type="time" name="time" required>
        <input type="hidden" name="service" id="serviceInput">
        <button type="submit">Submit & Pay Cash App</button>
    </form>
</div>

<!-- CONFIRMATION POPUP -->
<div id="confirmation">
    <h2 id="confirmMessage"></h2>
    <p>Redirecting to Cash App...</p>
</div>

<footer>
    Support: 832-370-6594 | © 2026 A.T.K FreshBin
</footer>

<script>
// SHOW FORM FUNCTION
function showForm(service){
    document.getElementById("checkout").style.display="block";
    document.getElementById("serviceChosen").innerText="Selected Service: " + service;
    document.getElementById("serviceInput").value = service;
    window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

// FORM SUBMIT + CONFIRM + CASH APP REDIRECT
document.getElementById('bookingForm').addEventListener('submit', function(e){
    e.preventDefault();
    const service = document.getElementById('serviceInput').value;
    document.getElementById('confirmMessage').innerText = `Thanks! Your booking for ${service} is confirmed.`;
    document.getElementById('confirmation').style.display='block';
    fetch(this.action,{method:"POST", body:new FormData(this), headers:{'Accept':'application/json'}})
    .finally(()=>setTimeout(()=>{ window.location.href = "https://cash.app/$Taeski09"; },1500));
});
</script>

</body>
</html>
