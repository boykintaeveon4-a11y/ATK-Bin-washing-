<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.T.K FreshBin</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#111;
    color:white;
    scroll-behavior: smooth;
}

/* LOADER */
#loader {
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    flex-direction:column;
}
.loader-circle {
    width:60px;
    height:60px;
    border:4px solid #00c6ff;
    border-top:4px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* NAV */
nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:2px solid #00c6ff;
    z-index: 100;
}
nav button {
    background:none;
    border:none;
    color:#00c6ff;
    font-size:16px;
    cursor:pointer;
}

/* SECTIONS */
section {
    min-height:100vh;
    padding:40px 20px;
    box-sizing:border-box;
}

/* HEADER */
h1 {
    text-align:center;
    text-shadow:0 0 20px #00c6ff;
}

/* CARDS */
.card {
    background:#222;
    padding:20px;
    border-radius:20px;
    margin:20px auto;
    text-align:center;
    max-width:400px;
    box-shadow:0 0 20px #00c6ff;
}
.card button {
    background:#00c6ff;
    border:none;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
}

/* INPUT */
input {
    display:block;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
    border:none;
    width:80%;
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-circle"></div>
    <p>Loading A.T.K...</p>
</div>

<!-- SECTIONS -->

<section id="home">
    <h1>A.T.K FreshBin</h1>
    <p style="text-align:center;">Premium Bin Cleaning</p>
</section>

<section id="services">
    <h1>Services</h1>

    <div class="card">
        🗑️ 1 Bin - $30
        <button onclick="selectService('1 Bin - $30')">Book</button>
    </div>

    <div class="card">
        🔥 2 Bins - $50
        <button onclick="selectService('2 Bins - $50')">Book</button>
    </div>

    <div class="card">
        🌿 Grass - $25
        <button onclick="selectService('Grass - $25')">Book</button>
    </div>
</section>

<section id="gallery">
    <h1>Photos</h1>
    <p>Before / After coming soon</p>
</section>

<section id="book">
    <h1>Book</h1>
    <p id="serviceText"></p>

    <form id="form" action="https://formspree.io/f/xeeprrlv" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="date" name="date" required>
        <input type="time" name="time" required>
        <input type="hidden" name="service" id="serviceInput">
        <button type="submit">Pay with Cash App</button>
    </form>

    <p style="text-align:center;">📞 832-370-6594</p>
</section>

<!-- NAV -->
<nav>
    <button onclick="scrollToSection('home')">🏠</button>
    <button onclick="scrollToSection('services')">🧼</button>
    <button onclick="scrollToSection('gallery')">📸</button>
    <button onclick="scrollToSection('book')">💳</button>
</nav>

<script>
/* SCROLL FUNCTION */
function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* SERVICE SELECT */
function selectService(service){
    document.getElementById("serviceText").innerText = "Selected: " + service;
    document.getElementById("serviceInput").value = service;
    scrollToSection('book');
}

/* LOADER */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 1200);
};

/* FORM SUBMIT */
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    fetch(this.action, {
        method:"POST",
        body:new FormData(this)
    }).then(() => {
        window.location.href = "https://cash.app/$Taeski09";
    });
});
</script>

</body>
</html>
