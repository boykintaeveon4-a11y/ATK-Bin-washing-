<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.T.K. FreshBin</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#0a0f1c;
    color:white;
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    background:#05070f;
    display:flex;
    justify-content:center;
    padding:12px;
    border-bottom:2px solid #00eaff;
    gap:30px;
}
nav button {
    background:none;
    border:none;
    color:#00eaff;
    font-size:22px;
    cursor:pointer;
}

/* SECTIONS */
section {
    min-height:100vh;
    padding:90px 20px;
}
h1 {
    text-align:center;
    text-shadow:0 0 20px #00eaff;
}

/* CARD */
.card {
    background:#111827;
    padding:20px;
    margin:15px auto;
    border-radius:15px;
    max-width:400px;
    text-align:center;
    box-shadow:0 0 15px #00eaff55;
}
.card button {
    margin-top:10px;
}

/* INPUT */
input, select {
    display:block;
    margin:10px auto;
    padding:12px;
    width:80%;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
}

/* BUTTON */
.pay-btn {
    background:#00eaff;
    color:#000;
    padding:12px;
    border:none;
    border-radius:10px;
    width:80%;
    font-weight:bold;
}
.map-btn {
    background:#00eaff;
    color:#000;
    padding:10px;
    border:none;
    border-radius:10px;
    width:80%;
}

/* TOTAL */
.total-box {
    text-align:center;
    font-size:22px;
    color:#00eaff;
}
</style>
</head>

<body>

<nav>
    <button onclick="scrollToSection('home')">🏠</button>
    <button onclick="scrollToSection('services')">🧼</button>
    <button onclick="scrollToSection('book')">💳</button>
</nav>

<section id="home">
    <h1>A.T.K. FreshBin</h1>
    <p style="text-align:center;">Premium Trash Bin Cleaning</p>
</section>

<section id="services">
    <h1>Services</h1>

    <div class="card">🗑️ 1 Bin - $30 <br>
        <button onclick="addService('1 Bin',30)">Add</button>
    </div>

    <div class="card">🔥 2 Bins - $50 <br>
        <button onclick="addService('2 Bins',50)">Add</button>
    </div>

    <div class="card">🌿 Grass - $25 <br>
        <button onclick="addService('Grass',25)">Add</button>
    </div>

    <div style="text-align:center;">
        <button onclick="clearServices()">Reset Services</button>
    </div>
</section>

<section id="book">
    <h1>Book</h1>

    <p id="serviceList" style="text-align:center;"></p>

    <div class="total-box" id="totalPrice">Total: $0</div>

    <form id="form">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="email" name="email" placeholder="Email" required>

        <input type="text" id="address" name="address" placeholder="Your Address" required>

        <button type="button" class="map-btn" onclick="openMap()">Open Map 📍</button>

        <input type="date" name="date" required>

        <select name="time" required>
            <option value="">Select Time</option>
            <option>9:00 AM</option>
            <option>10:00 AM</option>
            <option>11:00 AM</option>
            <option>12:00 PM</option>
            <option>1:00 PM</option>
            <option>2:00 PM</option>
            <option>3:00 PM</option>
            <option>4:00 PM</option>
            <option>5:00 PM</option>
            <option>6:00 PM</option>
        </select>

        <input type="hidden" id="servicesInput" name="services">
        <input type="hidden" id="priceInput" name="price">

        <button class="pay-btn" type="submit">Pay with Cash App 💸</button>
    </form>
</section>

<script>
let services = {};
let total = 0;

/* ADD SERVICE (NO DUP BUGS) */
function addService(name, price){
    if(!services[name]){
        services[name] = 0;
    }
    services[name]++;

    total += price;

    updateDisplay();
    scrollToSection('book');
}

/* RESET */
function clearServices(){
    services = {};
    total = 0;
    updateDisplay();
}

/* UPDATE UI */
function updateDisplay(){
    let list = [];

    for(let s in services){
        list.push(s + " x" + services[s]);
    }

    document.getElementById("serviceList").innerText =
        list.length ? "Selected: " + list.join(", ") : "No services selected";

    document.getElementById("totalPrice").innerText =
        "Total: $" + total;

    document.getElementById("servicesInput").value =
        list.join(", ");

    document.getElementById("priceInput").value = total;
}

/* MAP */
function openMap(){
    let address = document.getElementById("address").value;
    if(address){
        window.open("https://www.google.com/maps/search/" + encodeURIComponent(address));
    } else {
        alert("Enter your address first");
    }
}

/* SCROLL */
function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* FORM */
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    if(total <= 0){
        alert("Select at least one service");
        return;
    }

    fetch("https://formspree.io/f/xeeprrlv", {
        method:"POST",
        body:new FormData(this)
    })
    .then(() => {
        window.location.href = "https://cash.app/$Taeski09/" + total;
    })
    .catch(() => {
        alert("Error sending booking");
    });
});
</script>

</body>
</html>
