<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.T.K FreshBin</title>
<style>
html { scroll-behavior: smooth; }
body { margin:0; font-family:'Segoe UI', Arial; background:#000; color:white; overflow-x:hidden; }

/* NAVBAR */
nav { position:sticky; top:0; background:rgba(0,0,0,0.8); padding:15px; text-align:center; z-index:1000; border-bottom: 2px solid #00c6ff; animation: pulseBorder 2s infinite alternate; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }

/* HEADER */
header { text-align:center; padding:60px 20px; border: 2px solid #00c6ff; border-radius:20px; animation: pulseBorder 2s infinite alternate; }
h1 { font-size:50px; text-shadow:0 0 10px #00c6ff,0 0 20px #3399ff; }
.subtitle { color:#00c6ff; font-size:22px; text-shadow:0 0 5px #00c6ff; }

/* CARDS */
.container { display:flex; justify-content:center; gap:25px; flex-wrap:wrap; padding:20px; }
.card { background:#111; padding:30px; border-radius:25px; width:280px; text-align:center; transition:0.4s; box-shadow:0 0 25px #00c6ff; border: 2px solid #00c6ff; animation: pulseBorder 3s infinite alternate; position: relative; }
.card:hover { transform:translateY(-12px) scale(1.08); box-shadow:0 0 35px #00c6ff,0 0 50px #66ccff; }

/* SERVICE ICON */
.card-icon {
    font-size:40px;
    margin-bottom:15px;
    display:block;
    animation: iconPulse 2s infinite alternate;
    color:#00c6ff;
}

/* PRICE */
.price { color:#00c6ff; font-size:30px; }

/* BUTTONS */
button { padding:15px 25px; border:none; border-radius:15px; color:white; font-weight:bold; cursor:pointer; transition:0.4s; box-shadow:0 0 15px #00c6ff; font-size:16px; }
.led-button { background:linear-gradient(45deg,#3399ff,#00c6ff); box-shadow:0 0 10px #00c6ff,0 0 15px #3399ff; }
.led-button:hover { transform:scale(1.12); box-shadow:0 0 25px #00c6ff,0 0 35px #3399ff,0 0 50px #66ccff; animation: glow 1s infinite alternate; }
@keyframes glow { 0% { box-shadow:0 0 25px #00c6ff,0 0 35px #3399ff; } 100% { box-shadow:0 0 35px #3399ff,0 0 50px #66ccff; } }
@keyframes iconPulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

/* GALLERY */
.gallery { display:flex; gap:15px; overflow-x:auto; padding:20px; }
.gallery img { width:240px; border-radius:15px; transition:0.4s; border:2px solid #00c6ff; animation: pulseBorder 4s infinite alternate; }
.gallery img:hover { transform:scale(1.12); }

/* SECTION TITLES */
.section-title { text-align:center; margin-top:50px; font-size:28px; color:#00c6ff; }

/* CHECKOUT FORM */
#checkout { display:none; text-align:center; padding:50px; border-top:2px solid #00c6ff; animation: pulseBorder 2s infinite alternate; }
input, select { padding:14px; margin:10px; border-radius:12px; border:none; width:240px; }

/* HIDE DATE/TIME VISUALLY */
input[type=date], input[type=time] { display:none; }

/* FOOTER */
footer { text-align:center; padding:25px; opacity:0.8; border-top:2px solid #00c6ff; border-radius:12px; animation: pulseBorder 2s infinite alternate; }

/* CONFIRMATION POPUP */
#confirmation {
    display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
    background:#111; border:2px solid #00c6ff; padding:40px; border-radius:20px;
    box-shadow:0 0 25px #00c6ff,0 0 40px #3399ff; text-align:center; z-index:99999;
}
#confirmation h2 { color:#00c6ff; margin-bottom:20px; }

/* ANIMATED BORDER PULSE */
@keyframes pulseBorder {
    0% { box-shadow:0 0 5px #00c6ff; }
    50% { box-shadow:0 0 20px #00c6ff,0 0 35px #3399ff; }
    100% { box-shadow:0 0 5px #00c6ff; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#gallery">Photos</a>
    <a href="#checkout">Book</a>
</nav>

<!-- HEADER -->
<header>
    <h1>A.T.K FreshBin</h1>
    <p class="subtitle">Trash Bin Cleaning & Lawn Care</p>
</header>

<!-- SERVICES -->
<h2 id="services" class="section-title">Our Services</h2>
<div class="container">
    <div class="card">
        <span class="card-icon">🗑️</span>
        <h2>1 Bin Cleaning</h2>
        <p class="price">$30</p>
        <button class="led-button" onclick="showForm('1 Bin - $30')">Book & Pay</button>
    </div>
    <div class="card">
        <span class="card-icon">🔥</span>
        <h2>2 Bin Deal</h2>
        <p class="price">$50</p>
        <button class="led-button" onclick="showForm('2 Bins - $50')">Book & Pay</button>
    </div>
    <div class="card">
        <span class="card-icon">🌿</span>
        <h2>Grass Cutting</h2>
        <p class="price">$25</p>
        <button class="led-button" onclick="showForm('Grass Cutting - $25')">Book & Pay</button>
    </div>
</div>

<!-- GALLERY -->
<h2 id="gallery" class="section-title">Before / After</h2>
<div class="gallery">
    <img src="https://via.placeholder.com/240?text=Before+Bin">
    <img src="https://via.placeholder.com/240?text=After+Bin">
    <img src="https://via.placeholder.com/240?text=Lawn+Before">
    <img src="https://via.placeholder.com/240?text=Lawn+After">
</div>

<!-- MAP -->
<h2 class="section-title">Service Area</h2>
<div style="text-align:center;">
<iframe width="90%" height="260" style="border:0;border-radius:12px;" 
src="https://maps.google.com/maps?q=Tulsa,Oklahoma&z=11&output=embed"></iframe>
</div>

<!-- CHECKOUT -->
<div id="checkout">
    <h2>Book & Pay</h2>
    <p id="serviceChosen"></p>
    <form id="bookingForm" action="https://formspree.io/f/xeeprrlv" method="POST" target="_blank">
        <input type="text" name="name" placeholder="Name" required><br>
        <input type="text" name="phone" placeholder="Phone" required><br>
        <input type="email" name="email" placeholder="Email" required><br>
        <input type="date" name="date" value="" required>
        <input type="time" name="time" value="" required>
        <input type="hidden" name="service" id="serviceInput">
        <button type="submit" class="led-button">Submit & Pay Cash App</button>
    </form>
    <p>Support: 832-370-6594</p>
</div>

<!-- CONFIRMATION -->
<div id="confirmation">
    <h2 id="confirmMessage"></h2>
    <p>Redirecting to Cash App...</p>
</div>

<script>
function showForm(service){
    document.getElementById("checkout").style.display="block";
    document.getElementById("serviceChosen").innerText="Selected Service: "+service;
    document.getElementById("serviceInput").value=service;
    window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

document.getElementById('bookingForm').addEventListener('submit', function(e){
    e.preventDefault();
    const service=document.getElementById('serviceInput').value;
    document.getElementById('confirmMessage').innerText=`Thanks! Your booking for ${service} is confirmed.`;
    document.getElementById('confirmation').style.display='block';
    fetch(this.action,{method:"POST", body:new FormData(this), headers:{'Accept':'application/json'}})
    .finally(()=>setTimeout(()=>{ window.location.href="https://cash.app/$Taeski09"; },1200));
});
</script>

<footer>
    © 2026 A.T.K FreshBin
</footer>

</body>
</html>
