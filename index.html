<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshBin Pros</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin:0;
    background:#0b1f3a; /* dark blue */
    color:white;
  }

  header {
    text-align:center;
    padding:50px 20px;
    background:#102a4d;
  }

  h1 { margin:0; font-size:2.5em; }

  section {
    padding:40px 20px;
    max-width:1000px;
    margin:auto;
  }

  .services {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }

  .card {
    background:#163a66;
    padding:20px;
    border-radius:12px;
  }

  .price {
    font-size:1.4em;
    font-weight:bold;
    margin:10px 0;
  }

  button {
    background:#00c2ff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
  }

  #checkout {
    display:none;
    background:#102a4d;
    padding:30px;
    border-radius:12px;
    margin-top:30px;
  }

  input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:none;
  }

  .pay-btn {
    background:#00ff9d;
    color:black;
    width:100%;
    padding:15px;
    font-size:1.1em;
  }

</style>
</head>

<body>

<header>
  <h1>FreshBin Pros</h1>
  <p>Premium Trash Can Cleaning</p>
</header>

<section>
  <h2>Choose Your Service</h2>

  <div class="services">

    <div class="card">
      <h3>Standard Bin Cleaning</h3>
      <p>$30 per bin</p>
      <button onclick="selectService('Standard Bin Cleaning', 30)">Select</button>
    </div>

    <div class="card">
      <h3>Deep Clean</h3>
      <p>$40 per bin</p>
      <button onclick="selectService('Deep Clean', 40)">Select</button>
    </div>

    <div class="card">
      <h3>Monthly Plan</h3>
      <p>$25 per bin</p>
      <button onclick="selectService('Monthly Plan', 25)">Select</button>
    </div>

    <div class="card">
      <h3>Commercial Cleaning</h3>
      <p>$60+</p>
      <button onclick="selectService('Commercial Cleaning', 60)">Select</button>
    </div>

  </div>

  <!-- CHECKOUT -->
  <div id="checkout">
    <h2>Checkout</h2>

    <p id="service-name"></p>
    <p id="service-price"></p>

    <input type="text" placeholder="Your Name">
    <input type="text" placeholder="Address">
    <input type="text" placeholder="Phone Number">

    <a href="sms:YOURNUMBER" class="pay-btn">Text to Book</a>
  </div>

</section>

<script>
function selectService(name, price) {
  document.getElementById("checkout").style.display = "block";
  document.getElementById("service-name").innerText = "Service: " + name;
  document.getElementById("service-price").innerText = "Price: $" + price;
  window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
