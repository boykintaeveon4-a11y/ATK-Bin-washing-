<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshBin & Lawn Pros</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0b1f3a, #061326);
    color: white;
}

/* NAVBAR */
nav {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
    animation: fadeIn 1s ease-in;
}

h1 {
    font-size: 44px;
}

.subtitle {
    color: #4da6ff;
}

/* CARDS */
.container {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    padding: 20px;
}

.card {
    background: #122b52;
    padding: 25px;
    border-radius: 20px;
    width: 260px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.card:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 0 25px #1e90ff;
}

.price {
    color: #4da6ff;
    font-size: 28px;
}

/* BUTTON */
button {
    padding: 12px 22px;
    background: linear-gradient(45deg, #1e90ff, #00c6ff);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

/* GALLERY */
.gallery {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 20px;
}

.gallery img {
    width: 220px;
    border-radius: 12px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* SECTION TITLES */
.section-title {
    text-align: center;
    margin-top: 40px;
}

/* CHECKOUT */
#checkout {
    display: none;
    text-align: center;
    padding: 40px;
    animation: fadeIn 0.7s ease-in;
}

input, select {
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    width: 220px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#gallery">Photos</a>
    <a href="#checkout">Book</a>
</nav>

<!-- HEADER -->
<header>
    <h1>FreshBin & Lawn Pros</h1>
    <p class="subtitle">Clean Bins. Clean Lawns. No Stress.</p>
</header>

<!-- SERVICES -->
<h2 id="services" class="section-title">Our Services</h2>

<div class="container">

<div class="card">
    <h2>1 Bin Cleaning</h2>
    <p class="price">$30</p>
    <button onclick="selectService('1 Bin - $30',30)">Book Now</button>
</div>

<div class="card">
    <h2>🔥 2 Bin Deal</h2>
    <p class="price">$50</p>
    <button onclick="selectService('2 Bins - $50',50)">Book Now</button>
</div>

<div class="card">
    <h2>Grass Cutting</h2>
    <p class="price">$25</p>
    <button onclick="selectService('Grass Cutting - $25',25)">Book Now</button>
</div>

</div>

<!-- GALLERY -->
<h2 id="gallery" class="section-title">Before / After</h2>

<div class="gallery">
    <img src="https://via.placeholder.com/220?text=Dirty+Bin">
    <img src="https://via.placeholder.com/220?text=Clean+Bin">
    <img src="https://via.placeholder.com/220?text=Lawn+Before">
    <img src="https://via.placeholder.com/220?text=Lawn+After">
</div>

<!-- MAP -->
<h2 class="section-title">Service Area</h2>

<div style="text-align:center;">
<iframe 
width="90%" 
height="260" 
style="border:0;border-radius:12px;" 
src="https://maps.google.com/maps?q=Tulsa,Oklahoma&z=11&output=embed">
</iframe>
</div>

<!-- CHECKOUT -->
<div id="checkout">
    <h2>Book Your Service</h2>
    <p id="serviceChosen"></p>

    <input type="text" placeholder="Name"><br>
    <input type="text" placeholder="Address"><br>
    <input type="text" placeholder="Phone"><br>

    <input type="date"><br>
    <input type="time"><br>

    <select id="payment">
        <option>Cash App</option>
        <option>PayPal</option>
        <option>Venmo</option>
        <option>Apple Pay</option>
    </select><br>

    <button onclick="payNow()">Continue to Payment</button>
</div>

<footer>
    © 2026 FreshBin & Lawn Pros
</footer>

<script>
let total = 0;

function selectService(service, price) {
    document.getElementById("checkout").style.display = "block";
    document.getElementById("serviceChosen").innerText = "Selected: " + service;
    total = price;
    document.getElementById("checkout").scrollIntoView({ behavior: "smooth" });
}

function payNow() {
    let method = document.getElementById("payment").value;

    if(method === "Cash App") {
        window.location.href = "https://cash.app/$Taeski09";
    }
    else if(method === "PayPal") {
        window.location.href = "https://paypal.me/YourLink";
    }
    else if(method === "Venmo") {
        window.location.href = "https://venmo.com/YourLink";
    }
    else {
        alert("Apple Pay: Accept in person or upgrade to Stripe later");
    }
}
</script>

</body>
</html>
