<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATKFreshBin</title>

<style>
html { scroll-behavior: smooth; }
body { margin:0; font-family:'Segoe UI', Arial; background:#000; color:white; overflow-x:hidden; cursor:default; position:relative; }

/* PARTICLE GLOW */
.particle { position:absolute; border-radius:50%; background:rgba(255,255,255,0.15); pointer-events:none; }

/* NAVBAR */
nav { position:sticky; top:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); padding:15px; text-align:center; z-index:1000; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }

/* HEADER */
header { text-align:center; padding:60px 20px; position:relative; z-index:5; }
h1 { font-size:50px; text-shadow:0 0 10px #fff,0 0 20px #aaa; }
.subtitle { color:#ccc; font-size:22px; text-shadow:0 0 5px #fff; }

/* CARDS */
.container { display:flex; justify-content:center; gap:25px; flex-wrap:wrap; padding:20px; position:relative; z-index:5; }
.card { background:#111; padding:30px; border-radius:25px; width:280px; text-align:center; transition:0.4s; 
       box-shadow:0 0 25px #555; border: 2px solid #fff; animation: neonPulse 2s infinite alternate;}
.card:hover { transform:translateY(-12px) scale(1.08); box-shadow:0 0 35px #fff,0 0 50px #aaa; }
@keyframes neonPulse {
    0% { border-color: #fff; box-shadow:0 0 25px #fff;}
    50% { border-color: #aaa; box-shadow:0 0 35px #aaa;}
    100% { border-color: #ccc; box-shadow:0 0 45px #ccc;}
}
.price { color:#fff; font-size:30px; }

/* BUTTONS */
button { padding:15px 25px; border:none; border-radius:15px; color:white; font-weight:bold; cursor:pointer; transition:0.4s; box-shadow:0 0 15px #fff; font-size:16px; }
.led-button { background:linear-gradient(45deg,#fff,#aaa); box-shadow:0 0 10px #fff,0 0 15px #aaa; }
.led-button:hover { transform:scale(1.12); box-shadow:0 0 25px #fff,0 0 35px #aaa,0 0 50px #ccc; animation: glow 1s infinite alternate; }
@keyframes glow { 0% { box-shadow:0 0 25px #fff,0 0 35px #aaa; } 100% { box-shadow:0 0 35px #aaa,0 0 50px #ccc; } }

/* GALLERY */
.gallery { display:flex; gap:15px; overflow-x:auto; padding:20px; position:relative; z-index:5; }
.gallery img { width:240px; border-radius:15px; transition:0.4s; filter: grayscale(100%); border:2px solid #fff; animation: neonPulse 2s infinite alternate;}
.gallery img:hover { transform:scale(1.12); filter: grayscale(0%); }

/* SECTION TITLES */
.section-title { text-align:center; margin-top:50px; font-size:28px; color:#fff; }

/* CHECKOUT FORM */
#checkout { display:none; text-align:center; padding:50px; border-top:2px solid #fff; animation: neonPulse 2s infinite alternate;}
input, select { padding:14px; margin:10px; border-radius:12px; border:none; width:240px; background:#222; color:white; }

/* MAP */
iframe { border: 2px solid #fff; border-radius:12px; animation: neonPulse 2s infinite alternate; }

/* FOOTER */
footer { text-align:center; padding:25px; opacity:0.7; position:relative; z-index:5; }

/* CONFIRMATION POPUP */
#confirmation {
    display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
    background:#111; border:2px solid #fff; padding:40px; border-radius:20px;
    box-shadow:0 0 25px #fff,0 0 40px #aaa; text-align:center; z-index:99999;
}
#confirmation h2 { color:#fff; margin-bottom:20px; }

/* SNOWFLAKES + LED SPARKS */
.snowflake { position:fixed; top:0; color:white; font-size:1.5em; opacity:0.8; z-index:9999;
    pointer-events:none; text-shadow:0 0 4px #fff,0 0 8px #aaa,0 0 12px #ccc; transition: transform 0.1s linear; }
.spark { position:absolute; width:3px; height:3px; border-radius:50%; background:white; opacity:0.7; pointer-events:none; z-index:9999; }
</style>
</head>
<body>

<!-- PARTICLE GLOW -->
<script>
const particles=[];
for(let i=0;i<60;i++){
    const p=document.createElement('div'); p.className='particle';
    p.style.width=Math.random()*6+4+'px'; p.style.height=p.style.width;
    p.style.left=Math.random()*window.innerWidth+'px';
    p.style.top=Math.random()*window.innerHeight+'px';
    document.body.appendChild(p); particles.push({el:p,x:parseFloat(p.style.left),y:parseFloat(p.style.top),dx:(Math.random()-0.5)*0.2,dy:(Math.random()-0.5)*0.2});
}
function animateParticles(){
    particles.forEach(p=>{
        p.x+=p.dx; p.y+=p.dy;
        if(p.x<0) p.x=window.innerWidth; if(p.x>window.innerWidth) p.x=0;
        if(p.y<0) p.y=window.innerHeight; if(p.y>window.innerHeight) p.y=0;
        p.el.style.transform=`translate(${p.x}px,${p.y}px)`;
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();
</script>

<!-- SNOWFLAKES + SPARKS -->
<script>
const flakes=[]; const sparks=[];
for(let i=0;i<60;i++){
    const flake=document.createElement('div'); flake.className='snowflake';
    flake.style.left=Math.random()*100+'vw'; flake.style.top=Math.random()*100+'vh';
    flake.style.fontSize=(Math.random()*20+10)+'px'; flake.innerHTML='❄';
    document.body.appendChild(flake);
    flakes.push({el:flake,x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,dx:Math.random()*2-1,dy:Math.random()*1.5+0.5});
}
document.addEventListener('mousemove', e=>{
    flakes.forEach(f=>{ f.dx+=(e.clientX/window.innerWidth-0.5)*0.05; 
        const spark=document.createElement('div'); spark.className='spark';
        spark.style.left=f.x+'px'; spark.style.top=f.y+'px';
        spark.style.opacity=Math.random();
        document.body.appendChild(spark);
        sparks.push({el:spark,life:Math.random()*30}); });
});
function animateFlakes(){
    flakes.forEach(f=>{
        f.x+=f.dx; f.y+=f.dy;
        if(f.y>window.innerHeight) f.y=-10;
        if(f.x>window.innerWidth) f.x=0;
        if(f.x<0) f.x=window.innerWidth;
        f.el.style.transform=`translate(${f.x}px,${f.y}px)`;
    });
    sparks.forEach((s,i)=>{
        s.life-=1; s.el.style.opacity=s.life/30;
        s.el.style.top=parseFloat(s.el.style.top)+1+'px';
        if(s.life<=0){ s.el.remove(); sparks.splice(i,1);}
    });
    requestAnimationFrame(animateFlakes);
}
animateFlakes();
</script>

<!-- NAV -->
<nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#gallery">Photos</a>
    <a href="#checkout">Book</a>
</nav>

<!-- HEADER -->
<header>
    <h1>ATKFreshBin</h1>
    <p class="subtitle">Trash Bin Cleaning & Lawn Care</p>
</header>

<!-- SERVICES -->
<h2 id="services" class="section-title">Our Services</h2>
<div class="container">
<div class="card">
    <h2>1 Bin Cleaning</h2>
    <p class="price">$30</p>
    <button class="led-button" onclick="showForm('1 Bin - $30')">Book & Pay</button>
</div>
<div class="card">
    <h2>🔥 2 Bin Deal</h2>
    <p class="price">$50</p>
    <button class="led-button" onclick="showForm('2 Bins - $50')">Book & Pay</button>
</div>
<div class="card">
    <h2>Grass Cutting</h2>
    <p class="price">$25</p>
    <button class="led-button" onclick="showForm('Grass Cutting - $25')">Book & Pay</button>
</div>
</div>

<!-- GALLERY -->
<h2 id="gallery" class="section-title">Before / After</h2>
<div class="gallery">
    <img src="images/before1.jpg">
    <img src="images/after1.jpg">
    <img src="images/lawn1.jpg">
    <img src="images/lawn2.jpg">
</div>

<!-- MAP -->
<h2 class="section-title">Service Area</h2>
<div style="text-align:center;">
<iframe width="90%" height="260" src="https://maps.google.com/maps?q=Tulsa,Oklahoma&z=11&output=embed"></iframe>
</div>

<!-- CHECKOUT -->
<div id="checkout">
    <h2>Book & Pay</h2>
    <p id="serviceChosen"></p>
    <form id="bookingForm" action="https://formspree.io/f/xeeprrlv" method="POST" target="_blank">
        <input type="text" name="name" placeholder="Name" required><br>
        <input type="text" name="address" placeholder="Address" required><br>
        <input type="text" name="phone" placeholder="Phone" required><br>
        <input type="date" name="date" required><br>
        <input type="time" name="time" required><br>
        <input type="hidden" name="service" id="serviceInput">
        <button type="submit" class="led-button">Submit & Pay Cash App</button>
    </form>
</div>

<!-- CONFIRMATION POPUP -->
<div id="confirmation">
    <h2 id="confirmMessage"></h2>
    <p>Redirecting to Cash App...</p>
</div>

<footer>
    © 2026 ATKFreshBin
</footer>

<script>
// SERVICE FORM
function showForm(service){
    document.getElementById("checkout").style.display="block";
    document.getElementById("serviceChosen").innerText="Selected Service: " + service;
    document.getElementById("serviceInput").value = service;
    window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

// FORM SUBMIT + POPUP + CASH APP
document.getElementById('bookingForm').addEventListener('submit', function(e){
    e.preventDefault();
    const service = document.getElementById('serviceInput').value;
    document.getElementById('confirmMessage').innerText = `Thanks! Your booking for ${service} is confirmed.`;
    document.getElementById('confirmation').style.display='block';
    fetch(this.action,{method:"POST", body:new FormData(this), headers:{'Accept':'application/json'}})
    .finally(()=>setTimeout(()=>{ window.location.href = "https://cash.app/$Taeski09"; },1200));
});
</script>

</body>
</html>
