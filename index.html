<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATKFreshBin</title>

<style>
html { scroll-behavior: smooth; }
body { margin:0; font-family:'Segoe UI', Arial; background:#000; color:white; overflow-x:hidden; cursor:default; }

/* NAVBAR */
nav { position:sticky; top:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); padding:15px; text-align:center; z-index:1000; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; transition:0.3s; }
nav a:hover { text-shadow:0 0 10px #fff; }

/* HEADER */
header { text-align:center; padding:60px 20px; }
h1 { font-size:50px; text-shadow:0 0 15px #fff,0 0 25px #ccc; }
.subtitle { color:#ccc; font-size:22px; text-shadow:0 0 8px #fff; }

/* CARDS */
.container { display:flex; justify-content:center; gap:25px; flex-wrap:wrap; padding:20px; }
.card { background:#111; padding:30px; border-radius:25px; width:280px; text-align:center; transition:0.4s; box-shadow:0 0 20px #fff; }
.card:hover { transform:translateY(-12px) scale(1.08); box-shadow:0 0 30px #fff,0 0 40px #ccc; }
.price { color:#fff; font-size:30px; }

/* BUTTONS */
button { padding:15px 25px; border:none; border-radius:15px; color:white; font-weight:bold; cursor:pointer; transition:0.4s; font-size:16px; background:#111; box-shadow:0 0 10px #fff; }
.led-button { box-shadow:0 0 15px #fff,0 0 25px #ccc; }
.led-button:hover { transform:scale(1.12); box-shadow:0 0 25px #fff,0 0 40px #ccc,0 0 60px #fff; animation: glow 1s infinite alternate; }
@keyframes glow { 0% { box-shadow:0 0 20px #fff,0 0 30px #ccc; } 100% { box-shadow:0 0 35px #fff,0 0 50px #ccc; } }

/* GALLERY */
.gallery { display:flex; gap:15px; overflow-x:auto; padding:20px; }
.gallery img { width:240px; border-radius:15px; transition:0.4s; }
.gallery img:hover { transform:scale(1.12); filter: brightness(1.2); }

/* SECTION TITLES */
.section-title { text-align:center; margin-top:50px; font-size:28px; color:#fff; text-shadow:0 0 10px #fff; }

/* CHECKOUT FORM */
#checkout { display:none; text-align:center; padding:50px; border-top:2px solid #fff; }
input, select { padding:14px; margin:10px; border-radius:12px; border:none; width:240px; background:#111; color:white; box-shadow:0 0 10px #fff; }

/* FOOTER */
footer { text-align:center; padding:25px; opacity:0.7; }

/* CONFIRMATION POPUP */
#confirmation {
    display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
    background:#111; border:2px solid #fff; padding:40px; border-radius:20px;
    box-shadow:0 0 25px #fff,0 0 40px #ccc; text-align:center; z-index:99999;
}
#confirmation h2 { color:#fff; margin-bottom:20px; }

/* SNOWFLAKES */
.snowflake { position:fixed; top:0; color:#fff; font-size:1.5em; opacity:0.8; z-index:9999; pointer-events:none; transition: transform 0.1s linear; }
</style>
</head>

<body>

<!-- SNOWFLAKES -->
<script>
const flakes=[];
for(let i=0;i<60;i++){
    const flake=document.createElement('div');
    flake.className='snowflake';
    flake.style.left=Math.random()*100+'vw';
    flake.style.top=Math.random()*100+'vh';
    flake.style.fontSize=(Math.random()*20+10)+'px';
    flake.innerHTML='❄';
    document.body.appendChild(flake);
    flakes.push({el:flake,x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,dx:Math.random()*2-1,dy:Math.random()*1.5+0.5});
}
document.addEventListener('mousemove', e=>{ flakes.forEach(f=>f.dx+=(e.clientX/window.innerWidth-0.5)*0.05); });
function animateFlakes(){ flakes.forEach(f=>{ f.x+=f.dx; f.y+=f.dy; if(f.y>window.innerHeight) f.y=-10; if(f.x>window.innerWidth) f.x=0; if(f.x<0) f.x=window.innerWidth; f.el.style.transform=`translate(${f.x}px,${f.y}px)`; }); requestAnimationFrame(animateFlakes); }
animateFlakes();
</script>

<!-- NAV -->
<nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#gallery">Photos</a>
    <a href="#checkout">Book</a>
</nav>

<!-- HEADER -->
<header>
    <h1>ATKFreshBin</h1>
    <p class="subtitle">Trash Bin Cleaning & Lawn Care</p>
</header>

<!-- SERVICES -->
<h2 id="services" class="section-title">Our Services</h2>
<div class="container">
<div class="card">
    <h2>1 Bin Cleaning</h2>
    <p class="price">$30</p>
    <button class="led-button" onclick="showForm('1 Bin - $30')">Book & Pay</button>
</div>
<div class="card">
    <h2>🔥 2 Bin Deal</h2>
    <p class="price">$50</p>
    <button class="led-button" onclick="showForm('2 Bins - $50')">Book & Pay</button>
</div>
<div class="card">
    <h2>Grass Cutting</h2>
    <p class="price">$25</p>
    <button class="led-button" onclick="showForm('Grass Cutting - $25')">Book & Pay</button>
</div>
</div>

<!-- GALLERY -->
<h2 id="gallery" class="section-title">Before / After</h2>
<div class="gallery">
    <img src="images/before1.jpg" alt="Before Bin">
    <img src="images/after1.jpg" alt="After Bin">
    <img src="images/lawn1.jpg" alt="Lawn Before">
    <img src="images/lawn2.jpg" alt="Lawn After">
</div>

<!-- MAP -->
<h2 class="section-title">Service Area</h2>
<div style="text-align:center;">
<iframe width="90%" height="260" style="border:0;border-radius:12px;" 
src="https://maps.google.com/maps?q=Tulsa,Oklahoma&z=11&output=embed"></iframe>
</div>

<!-- CHECKOUT -->
<div id="checkout">
    <h2>Book & Pay</h2>
    <p id="serviceChosen"></p>
    <form id="bookingForm" action="https://formspree.io/f/xeeprrlv" method="POST" target="_blank">
        <input type="text" name="name" placeholder="Name" required><br>
        <input type="text" name="address" placeholder="Address" required><br>
        <input type="text" name="phone" placeholder="Phone" required><br>
        <input type="date" name="date" required><br>
        <input type="time" name="time" required><br>
        <input type="hidden" name="service" id="serviceInput">
        <button type="submit" class="led-button">Submit & Pay Cash App</button>
    </form>
</div>

<!-- CONFIRMATION POPUP -->
<div id="confirmation">
    <h2 id="confirmMessage"></h2>
    <p>Redirecting to Cash App...</p>
</div>

<footer>
    © 2026 ATKFreshBin
</footer>

<script>
// SERVICE FORM
function showForm(service){
    document.getElementById("checkout").style.display="block";
    document.getElementById("serviceChosen").innerText="Selected Service: " + service;
    document.getElementById("serviceInput").value = service;
    window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}

// FORM SUBMIT + POPUP + CASH APP
document.getElementById('bookingForm').addEventListener('submit', function(e){
    e.preventDefault();
    const service = document.getElementById('serviceInput').value;
    document.getElementById('confirmMessage').innerText = `Thanks! Your booking for ${service} is confirmed.`;
    document.getElementById('confirmation').style.display='block';
    fetch(this.action,{method:"POST", body:new FormData(this), headers:{'Accept':'application/json'}})
    .finally(()=>setTimeout(()=>{ window.location.href = "https://cash.app/$Taeski09"; },1200));
});
</script>

</body>
</html>
