<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.T.K FreshBin</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background:#111;
    color:white;
    overflow:hidden;
}

/* LOADING SCREEN */
#loader {
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    flex-direction:column;
}
.loader-circle {
    width:60px;
    height:60px;
    border:4px solid #00c6ff;
    border-top:4px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* NAV */
nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:2px solid #00c6ff;
}
nav button {
    background:none;
    border:none;
    color:#00c6ff;
    font-size:16px;
}

/* PAGES */
#app {
    display:flex;
    width:400%;
    height:100vh;
    transition:transform 0.5s ease;
}

.page {
    width:100%;
    flex-shrink:0;
    padding:20px;
    overflow-y:auto;
}

/* HEADER */
h1 {
    text-align:center;
    text-shadow:0 0 20px #00c6ff;
}

/* CARDS */
.card {
    background:#222;
    padding:20px;
    border-radius:20px;
    margin:20px;
    text-align:center;
    box-shadow:0 0 20px #00c6ff;
}
.card button {
    background:#00c6ff;
    border:none;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

/* INPUT */
input {
    display:block;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
    border:none;
    width:80%;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-circle"></div>
    <p>Loading A.T.K...</p>
</div>

<!-- APP -->
<div id="app">

<!-- HOME -->
<div class="page">
    <h1>A.T.K FreshBin</h1>
    <p style="text-align:center;">Premium Bin Cleaning</p>
</div>

<!-- SERVICES -->
<div class="page">
    <h1>Services</h1>

    <div class="card">
        🗑️ 1 Bin - $30
        <button onclick="selectService('1 Bin - $30')">Book</button>
    </div>

    <div class="card">
        🔥 2 Bins - $50
        <button onclick="selectService('2 Bins - $50')">Book</button>
    </div>

    <div class="card">
        🌿 Grass - $25
        <button onclick="selectService('Grass - $25')">Book</button>
    </div>
</div>

<!-- GALLERY -->
<div class="page">
    <h1>Photos</h1>
    <p>Before / After coming soon</p>
</div>

<!-- BOOK -->
<div class="page">
    <h1>Book</h1>
    <p id="serviceText"></p>

    <form id="form" action="https://formspree.io/f/xeeprrlv" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="date" name="date" required>
        <input type="time" name="time" required>
        <input type="hidden" name="service" id="serviceInput">
        <button type="submit">Pay with Cash App</button>
    </form>

    <p style="text-align:center;">📞 832-370-6594</p>
</div>

</div>

<!-- NAV -->
<nav>
    <button onclick="goToPage(0)">🏠</button>
    <button onclick="goToPage(1)">🧼</button>
    <button onclick="goToPage(2)">📸</button>
    <button onclick="goToPage(3)">💳</button>
</nav>

<script>
let currentPage = 0;
const app = document.getElementById('app');

/* NAV CLICK */
function goToPage(index){
    currentPage = index;
    app.style.transform = `translateX(-${index * 100}%)`;
}

/* SERVICE SELECT */
function selectService(service){
    document.getElementById("serviceText").innerText = "Selected: " + service;
    document.getElementById("serviceInput").value = service;
    goToPage(3);
}

/* SWIPE SUPPORT */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if(diff > 50 && currentPage < 3) currentPage++;
    if(diff < -50 && currentPage > 0) currentPage--;

    goToPage(currentPage);
});

/* LOADER */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 1200);
};

/* FORM SUBMIT */
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    fetch(this.action, {
        method:"POST",
        body:new FormData(this)
    }).then(() => {
        window.location.href = "https://cash.app/$Taeski09";
    });
});
</script>

</body>
</html>
